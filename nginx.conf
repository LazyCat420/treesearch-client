server {
    listen 8006;
    root /usr/share/nginx/html;
    
    location /api/ {
        proxy_pass http://10.0.0.16:8005;
        proxy_buffering off;       # Important for NDJSON streaming
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
    
    location /static/ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
    
    location / {
        try_files $uri /index.html;
    }
}
